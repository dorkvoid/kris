<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>krisroller</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #cfcfcf;
            overflow: hidden; 
            font-family: sans-serif;
            touch-action: none;
            
            /* User select none prevents highlighting when holding shift and clicking! */
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            
            /* Custom Cursors! */
            /* If you want them bigger, scale the physical .png file up in Aseprite (e.g., 32x32 or 48x48) */
            cursor: url('./images/cursor.png'), auto;
        }

        body:active, html:active {
            cursor: url('./images/cursor_click.png'), auto;
        }

        #game-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #instruction-bg {
            position: absolute;
            top: 10%; /* Pushes it down slightly from the very top */
            left: 50%; /* Centers it horizontally */
            transform: translateX(-50%);
            /* Keeps the pixel art crisp if it's scaled */
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            z-index: 0; /* Layer 0: The very bottom background layer */
            
            /* Prevent highlighting or dragging */
            user-drag: none;
            -webkit-user-drag: none;
            pointer-events: none;
        }

        /* Updated to support your custom shadow.png */
        #player-shadow {
            position: absolute;
            width: auto; 
            height: auto;
            transform: translate(-50%, -50%);
            /* Prevents mipmapping and forces true pixel-art scaling */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            image-rendering: pixelated; 
            opacity: 0.6; /* Added transparency (1 is solid, 0 is invisible) */
            z-index: 1; /* Layer 1: Renders above the instructions */
            
            /* Extra safety to ensure the image itself cannot be highlighted or dragged */
            user-drag: none;
            -webkit-user-drag: none;
            pointer-events: none; /* Let clicks pass right through the shadow */
        }

        #player-sprite {
            position: absolute;
            width: auto; 
            height: auto;
            transform: translate(-50%, -50%);
            /* Prevents mipmapping and forces true pixel-art scaling on all modern browsers */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            image-rendering: pixelated; 
            color: transparent; 
            z-index: 2; /* Layer 2: Renders above the shadow and instructions */
            
            /* Extra safety to ensure Kris cannot be highlighted or dragged */
            user-drag: none;
            -webkit-user-drag: none;
            pointer-events: none; /* Let clicks pass right through Kris */
        }

        #touch-controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: grid;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px 60px;
            gap: 5px;
            opacity: 0.5;
            z-index: 10;
        }

        @media (min-width: 768px) {
            #touch-controls {
                display: none; 
            }
        }

        .btn {
            background: #ccc;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            user-select: none;
            -webkit-user-select: none;
            pointer-events: auto; /* Buttons still need to be clickable despite the body rule */
        }
        
        .btn:active {
            background: #999;
        }

        #btn-up-left { grid-column: 1; grid-row: 1; }
        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-up-right { grid-column: 3; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down-left { grid-column: 1; grid-row: 3; }
        #btn-down { grid-column: 2; grid-row: 3; }
        #btn-down-right { grid-column: 3; grid-row: 3; }

    </style>
</head>
<body>

<div id="game-container">
    <!-- Background Instructions -->
    <img id="instruction-bg" src="./images/instr.png" alt="Instructions" draggable="false">
    
    <!-- Replaced the div with an image tag pointing to your shadow -->
    <img id="player-shadow" src="./images/shadow.png" alt="shadow" draggable="false">
    <img id="player-sprite" alt="Kris" draggable="false">
</div>

<div id="touch-controls">
    <div class="btn" id="btn-up-left">↖</div>
    <div class="btn" id="btn-up">↑</div>
    <div class="btn" id="btn-up-right">↗</div>
    <div class="btn" id="btn-left">←</div>
    <div class="btn" id="btn-right">→</div>
    <div class="btn" id="btn-down-left">↙</div>
    <div class="btn" id="btn-down">↓</div>
    <div class="btn" id="btn-down-right">↘</div>
</div>

<script>
    // ========================================================================
    // 🎨 SPRITE INJECTION ZONE
    // ========================================================================
    
    const SPRITES = {
        idle: {
            'down': ['./images/kris_idle_down.png'],
            'up': ['./images/kris_idle_up.png'],
            'right': ['./images/kris_idle_right.png'],
            'down-right': ['./images/kris_idle_dr.png'],
            'up-right': ['./images/kris_idle_ur.png']
        },
        walk: {
            'down': [
                './images/kris_idle_down.png', 
                './images/kris_walk_down_1.png', 
                './images/kris_idle_down.png',   
                './images/kris_walk_down_2.png'   
            ],
            'up': [
                './images/kris_idle_up.png', 
                './images/kris_walk_up_1.png', 
                './images/kris_idle_up.png',   
                './images/kris_walk_up_2.png' 
            ],
            'right': [
                './images/kris_idle_right.png', 
                './images/kris_walk_right_1.png', 
                './images/kris_idle_right.png',   
                './images/kris_walk_right_2.png' 
            ],
            'down-right': [
                './images/kris_idle_dr.png', 
                './images/kris_walk_dr_1.png', 
                './images/kris_idle_dr.png',   
                './images/kris_walk_dr_2.png' 
            ],
            'up-right': [
                './images/kris_idle_ur.png', 
                './images/kris_walk_ur_1.png', 
                './images/kris_idle_ur.png',   
                './images/kris_walk_ur_2.png' 
            ]
        }
    };

    // Automatically map left directions to use the right direction's images
    ['idle', 'walk'].forEach(state => {
        SPRITES[state]['left'] = SPRITES[state]['right'];
        SPRITES[state]['down-left'] = SPRITES[state]['down-right'];
        SPRITES[state]['up-left'] = SPRITES[state]['up-right'];
    });

    // ========================================================================
    // 🚀 ASSET PRELOADER (Fixes Animation Jitter!)
    // ========================================================================
    // This forces the browser to silently load every frame into memory 
    // the moment the page opens, preventing flickering when walking.
    const preloadedImages = {};
    Object.keys(SPRITES).forEach(state => {
        Object.keys(SPRITES[state]).forEach(dir => {
            SPRITES[state][dir].forEach(src => {
                if (!preloadedImages[src]) {
                    const img = new Image();
                    img.src = src;
                    preloadedImages[src] = img; // Keep it safely cached
                }
            });
        });
    });

    // ========================================================================
    // ⚙️ GAME ENGINE LOGIC
    // ========================================================================

    const spriteElement = document.getElementById('player-sprite');
    const shadowElement = document.getElementById('player-shadow');
    
    // Player State
    const player = {
        x: window.innerWidth / 2,
        y: window.innerHeight / 2,
        scale: 3,           
        shadowOffset: 18,   // Increased from 16 to 18 to move the shadow down
        speed: 1.5,         
        walkSpeed: 1.5,     
        runSpeed: 2.5,      
        direction: 'down',  
        isMoving: false,
        isRunning: false,
        frameIndex: 0,
        frameTimer: 0,
        walkAnimSpeed: 20,  
        runAnimSpeed: 12,   
        currentSrc: null    
    };

    // Input tracking
    const keys = {
        ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
        w: false, a: false, s: false, d: false,
        Shift: false, x: false 
    };

    // Keyboard Listeners
    window.addEventListener('keydown', (e) => {
        if (keys.hasOwnProperty(e.key) || keys.hasOwnProperty(e.key.toLowerCase())) {
            keys[e.key.toLowerCase()] = true;
            keys[e.key] = true; 
            
            // Prevent Shift from trying to highlight text in some browsers
            if (e.key === 'Shift') {
                e.preventDefault();
            }
        }
    });

    window.addEventListener('keyup', (e) => {
        if (keys.hasOwnProperty(e.key) || keys.hasOwnProperty(e.key.toLowerCase())) {
            keys[e.key.toLowerCase()] = false;
            keys[e.key] = false;
        }
    });

    // Touch Controls Listeners (for mobile support)
    const setupTouchBtn = (id, dirs) => {
        const btn = document.getElementById(id);
        const start = (e) => { e.preventDefault(); dirs.forEach(d => keys[d] = true); };
        const end = (e) => { e.preventDefault(); dirs.forEach(d => keys[d] = false); };
        btn.addEventListener('touchstart', start);
        btn.addEventListener('touchend', end);
        btn.addEventListener('mousedown', start);
        btn.addEventListener('mouseup', end);
        btn.addEventListener('mouseleave', end);
    };

    setupTouchBtn('btn-up', ['ArrowUp']);
    setupTouchBtn('btn-down', ['ArrowDown']);
    setupTouchBtn('btn-left', ['ArrowLeft']);
    setupTouchBtn('btn-right', ['ArrowRight']);
    setupTouchBtn('btn-up-left', ['ArrowUp', 'ArrowLeft']);
    setupTouchBtn('btn-up-right', ['ArrowUp', 'ArrowRight']);
    setupTouchBtn('btn-down-left', ['ArrowDown', 'ArrowLeft']);
    setupTouchBtn('btn-down-right', ['ArrowDown', 'ArrowRight']);


    // Main Game Loop
    function gameLoop() {
        updateMovement();
        updateAnimation();
        render();
        requestAnimationFrame(gameLoop);
    }

    function updateMovement() {
        let dx = 0;
        let dy = 0;

        if (keys.ArrowUp || keys.w) dy -= 1;
        if (keys.ArrowDown || keys.s) dy += 1;
        if (keys.ArrowLeft || keys.a) dx -= 1;
        if (keys.ArrowRight || keys.d) dx += 1;

        // Check if running
        player.isRunning = keys.Shift || keys.x;
        player.speed = player.isRunning ? player.runSpeed : player.walkSpeed;

        // Check if moving
        player.isMoving = (dx !== 0 || dy !== 0);

        if (player.isMoving) {
            // Determine 8-way direction string based on dx/dy
            if (dx === 0 && dy < 0) player.direction = 'up';
            else if (dx === 0 && dy > 0) player.direction = 'down';
            else if (dx < 0 && dy === 0) player.direction = 'left';
            else if (dx > 0 && dy === 0) player.direction = 'right';
            else if (dx > 0 && dy > 0) player.direction = 'down-right';
            else if (dx < 0 && dy > 0) player.direction = 'down-left';
            else if (dx > 0 && dy < 0) player.direction = 'up-right';
            else if (dx < 0 && dy < 0) player.direction = 'up-left';

            // Normalize diagonal movement speed
            const length = Math.sqrt(dx * dx + dy * dy);
            dx = dx / length;
            dy = dy / length;

            // Apply speed
            player.x += dx * player.speed;
            player.y += dy * player.speed;

            // Screen boundaries clamping
            const rect = spriteElement.getBoundingClientRect();
            // Fallback so it doesn't break if an image is missing
            const fallbackWidth = rect.width || 57; 
            const fallbackHeight = rect.height || 114;
            
            const halfWidth = fallbackWidth / 2;
            const halfHeight = fallbackHeight / 2;
            player.x = Math.max(halfWidth, Math.min(window.innerWidth - halfWidth, player.x));
            player.y = Math.max(halfHeight, Math.min(window.innerHeight - halfHeight, player.y));
        }
    }

    function updateAnimation() {
        const state = player.isMoving ? 'walk' : 'idle';
        const currentSpriteArray = SPRITES[state][player.direction];

        if (currentSpriteArray.length <= 1) {
            player.frameIndex = 0;
            return;
        }

        player.frameTimer++;
        const currentAnimSpeed = player.isRunning ? player.runAnimSpeed : player.walkAnimSpeed;
        
        if (player.frameTimer >= currentAnimSpeed) {
            player.frameTimer = 0;
            player.frameIndex = (player.frameIndex + 1) % currentSpriteArray.length;
        }

        if (!player.isMoving && SPRITES.idle[player.direction].length === 1) {
             player.frameIndex = 0;
        }
    }

    function render() {
        // --- 1. RENDER SHADOW ---
        shadowElement.style.left = `${Math.round(player.x)}px`;
        shadowElement.style.top = `${Math.round(player.y + (player.shadowOffset * player.scale))}px`;
        shadowElement.style.transform = `translate(-50%, -50%) scale(${player.scale})`;

        // --- 2. RENDER KRIS ---
        spriteElement.style.left = `${Math.round(player.x)}px`;
        spriteElement.style.top = `${Math.round(player.y)}px`;

        const state = player.isMoving ? 'walk' : 'idle';
        
        if (SPRITES[state] && SPRITES[state][player.direction]) {
            const frames = SPRITES[state][player.direction];
            const safeFrameIndex = player.frameIndex % frames.length;
            const targetSrc = frames[safeFrameIndex];
            
            // Base horizontal flip based on direction
            const isFlipped = player.direction.includes('left');

            // Apply scale and potential flip
            spriteElement.style.transform = `translate(-50%, -50%) scale(${isFlipped ? -player.scale : player.scale}, ${player.scale})`;
            
            // Compare against our memory variable instead of the DOM to guarantee the first frame loads
            if (player.currentSrc !== targetSrc) {
                player.currentSrc = targetSrc;
                spriteElement.src = targetSrc;
            }
        }
    }

    window.addEventListener('resize', () => {
        const rect = spriteElement.getBoundingClientRect();
        const fallbackWidth = rect.width || 57; 
        const fallbackHeight = rect.height || 114;
        
        const halfWidth = fallbackWidth / 2;
        const halfHeight = fallbackHeight / 2;
        player.x = Math.max(halfWidth, Math.min(window.innerWidth - halfWidth, player.x));
        player.y = Math.max(halfHeight, Math.min(window.innerHeight - halfHeight, player.y));
    });

    // Start the game loop immediately!
    requestAnimationFrame(gameLoop);

</script>
</body>
</html>
